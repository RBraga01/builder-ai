name: Fork Follow-up

on:
  schedule:
    - cron: '0 9 * * 2'  # Every Tuesday at 09:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Days after fork before sending follow-up (default: 30)'
        default: '30'
        required: false

jobs:
  followup:
    name: Follow up with forkers
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Send follow-ups and update registry
        uses: actions/github-script@v7
        with:
          script: |
            // ── Config ──────────────────────────────────────────────────────
            const FOLLOWUP_AFTER_DAYS = parseInt(
              context.payload.inputs?.days || '30',
              10
            );
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const now = Date.now();

            // ── Load registry ───────────────────────────────────────────────
            const registryPath = '.github/forks-registry.json';
            let registry = [];
            let registrySha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: registryPath,
              });
              registrySha = data.sha;
              registry = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
            } catch {
              console.log('No registry found — nothing to do.');
              return;
            }

            // ── Load current stargazers once ────────────────────────────────
            let stargazers = [];
            try {
              stargazers = await github.paginate(
                github.rest.activity.listStargazersForRepo,
                { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
              );
            } catch {}

            let updated = false;

            for (const entry of registry) {
              if (entry.followup_sent) continue;
              if (!entry.welcome_issue_number) continue;

              const daysSinceFork = (now - new Date(entry.forked_at).getTime())
                / (1000 * 60 * 60 * 24);

              if (daysSinceFork < FOLLOWUP_AFTER_DAYS) {
                console.log(`@${entry.username}: ${Math.floor(daysSinceFork)} days — not yet.`);
                continue;
              }

              // Check current star status
              const nowStarred = stargazers.some(s => s.login === entry.username);

              // Build follow-up comment
              let starLine;
              if (nowStarred && !entry.starred_at_welcome) {
                starLine = `Thanks for starring the repo in the meantime ⭐ — that helps other teams find it.`;
              } else if (nowStarred) {
                starLine = `Thanks for the star too ⭐`;
              } else {
                starLine = `If builder-ai caught something before it reached production, a ⭐ [star](${repoUrl}) helps other teams find it 🙏`;
              }

              const comment = [
                `Hey @${entry.username} — checking in 👋`,
                ``,
                `It's been about ${Math.floor(daysSinceFork)} days since you forked builder-ai. Curious: did the hard gates catch anything? What are you building with it?`,
                ``,
                `If you'd like to be featured on the repo — reply here with:`,
                `- A one-liner about what you built or what failure mode you avoided`,
                `- Whether you'd like your name/project linked`,
                ``,
                `No pressure — genuinely curious what teams are using this for.`,
                ``,
                starLine,
              ].join('\n');

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: entry.welcome_issue_number,
                  body: comment,
                });

                entry.followup_sent = true;
                entry.followup_sent_at = new Date().toISOString();
                if (nowStarred) entry.starred_at_welcome = true;
                updated = true;

                console.log(`Follow-up sent to @${entry.username} (issue #${entry.welcome_issue_number})`);
              } catch (err) {
                console.error(`Failed for @${entry.username}: ${err.message}`);
              }
            }

            if (!updated) {
              console.log('No follow-ups due today.');
              return;
            }

            // ── Save registry ───────────────────────────────────────────────
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: registryPath,
              message: 'chore: mark follow-ups sent in forks registry',
              content: Buffer.from(JSON.stringify(registry, null, 2) + '\n').toString('base64'),
              sha: registrySha,
            });

            console.log('Registry updated.');
